<html></html>
 <head>
  <title>
   Futture Payment Page
  </title>
<link rel="stylesheet" href="pagamento.css">  
 </head>
 <body>
  <div class="header">
   <h1>
    FUTTURE
   </h1>
   <div class="nav">
    <a href="#">
     JOGADORES
    </a>
    <a href="#">
     SELETIVAS
    </a>
    <a href="#">
     CADASTRE-SE
    </a>
    <a class="active" href="#">
     ENTRAR
    </a>
   </div>
  </div>
  <div class="content">
   <div class="card">
    <div class="card-header">
     CARTAO DE CREDITO
     <i class="fas fa-caret-down">
     </i>
    </div>
    <div class="card-icons">
     <img alt="Visa logo" height="50" src="https://storage.googleapis.com/a1aa/image/p0DtxzrYTLYyAVNcx6Ohf6pJhzV3FbLNdsfv1ItAj1bUQtrTA.jpg" width="50"/>
     <img alt="Mastercard logo" height="50" src="https://storage.googleapis.com/a1aa/image/fwjMQ28E3FV9f0z0N6Dcpzweb05YT4ushegIjmOMNZGOB1uOB.jpg" width="50"/>
     <img alt="Diners logo" height="50" src="https://storage.googleapis.com/a1aa/image/1W0ud957wyLQGR9kSAwZ7XnBUDlaw5oNVJOVOnf0S7tKo21JA.jpg" width="50"/>
    </div>
   </div>
   <div class="summary">
    <div class="summary-header">
     RESUMO DA COMPRA
    </div>
    <p>
     VALOR TOTAL
    </p>
    <p>
     R$ XX,XX
    </p>
   </div>
  </div>
  <div class="form-section">
   <h2>
    INFORME OS DADOS DO SEU CARTAO DE CREDITO
   </h2>
   <div class="form-group">
    <label for="card-number">
     NUMERO DO CARTAO
    </label>
    <input id="card-number" placeholder="0000 0000 0000 000" type="text"/>
   </div>
   <div class="form-row">
    <div class="form-group">
     <label for="expiry-date">
      DATA DE VALIDADE
     </label>
     <input id="expiry-date" placeholder="/" type="text"/>
    </div>
    <div class="form-group">
     <label for="cvc">
      CODIGO DE SEGURANCA [?]
     </label>
     <input id="cvc" placeholder="CVC" type="text"/>
    </div>
   </div>
   <div class="form-group">
    <label for="payment-method">
     COMO DESEJA PAGAR ?
    </label>
    <select id="payment-method">
     <option>
      A VISTA
     </option>
    </select>
   </div>
   <div class="form-group">
    <input type="submit" value="CONFIRMAR"/>
   </div>
  </div>
 </body>
</html>
