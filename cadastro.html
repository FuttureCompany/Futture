<html>
<head>
    <title>FUTTURE</title>
    <link rel="stylesheet" href="cadastro.css">    
</head>
<body>
    <Header>
        <section class="navbar">
            <h1 class="logo">FUTTURE</h1>
            <nav class="menu">
            <a href="#">JOGADORES</a>
            <a href="#">SELETIVAS</a>
            <a href="#">CADASTRE-SE</a>
            <a href="#" class="active">ENTRAR</a>
            </nav>
        </section>
    </Header>
    <main>
        <section class="container">
            <section class="form-group">
                <label for="email">Email :</label>
                <input type="email" id="email" name="email">
            </section>
            <section class="form-group">
                <label for="username">Usuario :</label>
                <input type="text" id="username" name="username">
            </section>
            <section class="form-group">
                <label for="password">Senha :</label>
                <input type="password" id="password" name="password">
            </section>
            <section class="form-group">
                <label for="confirm-password">Confirmar a senha :</label>
                <input type="password" id="confirm-password" name="confirm-password">
            </section>
            <section class="checkbox-group">
                <input type="checkbox" id="terms" name="terms">
                <label for="terms">LI E CONCORDO COM OS <a href="#">TERMOS DE USO E A POLITICA DE PRIVACIDADE</a></label>
            </section>
            <button class="submit-btn">CONFIRMAR</button>
        </section>
    </main>
</body>
</html>
